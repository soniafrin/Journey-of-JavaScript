<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<body class="bg-slate-800 ">
    <section class="max-w-md bg-white min-h-screen mx-auto py-6">
        <header>
            <nav class="flex justify-center items-center mt-10">
                <div class="reletive flex justify-center items-center mt-10 w-9/12 ">
                    <img class="absolute w-48" src="/Payoo/assets/bg.png" alt="">
                    <img class="w-16" src="/Payoo/assets/Group.png" alt="">
                </div>
            </nav>
        </header>
<!-- Login here -->
<div class=" bg-base-200">
    <div class="hero-content flex-col lg:flex-row-reverse">
        <div class="card bg-base-100 w-full max-w-sm shrink-0">
            <form class="card-body">
                <fieldset class="fieldset">
                <label class="label">Account Numner</label>
                <input id="account-number" value="12345678900" type="text" class="input" placeholder="Account Numner"  required />
                <label class="label">Pin</label>
                <input id="login-pin" type="text" value="1234" class="input" placeholder="Pin" required/>
                <div><a class="link link-hover">Forgot password?</a></div>
                <button id="login-btn" class="btn btn-neutral mt-4">Login</button>
                </fieldset>
            </form>
        </div>
    </div>
</div>
        
</section>




    <script src="/Payoo/utilities.js"></script>
    <script src="/Payoo/login.js"></script>
</body>
</html>
